# Axiom BDX Default Configuration
# RL Training Parameters

# Environment
env:
  name: AxiomEnv
  frame_skip: 10
  render_mode: null

# Reward Weights
reward:
  time_alive: 0.05
  velocity_tracking: 1.0
  upright: 0.5
  walking_height: 0.5
  smoothness: 0.1
  feet_contact: 0.2
  thermal_penalty: -0.01
  gait_symmetry: 0.05
  init_position: 0.1

# Training
training:
  total_timesteps: 1000000
  num_envs: 16
  learning_rate: 0.0003
  gamma: 0.99
 gae_lambda: 0.95
  batch_size: 256
  n_epochs: 10
  clip_range: 0.2

# Simulation
simulation:
  dt: 0.002
  gravity: -9.81
  reset_noise_scale: 0.3

# Hardware Parameters (for sim-to-real)
hardware:
  servo_count: 15
  max_joint_velocity: 10.0
  thermal_limit: 80.0
  voltage_min: 3.0
  voltage_max: 4.2
